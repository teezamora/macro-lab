<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MACRO LAB — Bodybuilder Nutrition</title>
  <link rel="stylesheet" href="styles/global.css">
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* HERO */
    .hero { padding: 60px 40px 40px; max-width: 1100px; margin: 0 auto; animation: fadeUp 0.5s ease both; }
    .hero-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 8vw, 96px); line-height: 0.88; letter-spacing: 1px; margin-bottom: 24px; }
    .hero-title .hl { color: var(--accent); }
    .hero-sub { color: var(--muted); font-size: 15px; font-weight: 300; max-width: 420px; line-height: 1.6; margin-bottom: 40px; }

    /* STATS BAR */
    .stats-bar { display: flex; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 60px; }
    .stat-item { flex: 1; padding: 18px 20px; border-right: 1px solid var(--border); background: var(--surface); }
    .stat-item:last-child { border-right: none; }
    .stat-item .si-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; margin-bottom: 4px; }
    .stat-item .si-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

    /* FILTER BAR */
    .filter-bar { display: flex; gap: 8px; padding: 0 40px 28px; max-width: 1100px; margin: 0 auto; flex-wrap: wrap; }
    .filter-pill { padding: 7px 14px; border: 1px solid var(--border); border-radius: 100px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; background: var(--surface); color: var(--muted); user-select: none; }
    .filter-pill:hover { border-color: var(--border2); color: var(--text); }
    .filter-pill.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* SECTION HEADER */
    .section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; padding: 0 40px; max-width: 1100px; margin-left: auto; margin-right: auto; }
    .section-heading { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; }
    .section-meta { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* RECIPE GRID */
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; padding: 0 40px 60px; max-width: 1100px; margin: 0 auto; }

    /* RECIPE CARD */
    .recipe-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.22s cubic-bezier(.4,0,.2,1); position: relative; text-decoration: none; display: block; color: inherit; animation: fadeUp 0.5s ease both; }
    .recipe-card:hover { border-color: var(--border2); transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

    .card-thumb { height: 160px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .card-thumb-bg { position: absolute; inset: 0; }
    .card-thumb-emoji { position: relative; z-index: 1; font-size: 64px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); transition: transform 0.3s ease; }
    .recipe-card:hover .card-thumb-emoji { transform: scale(1.1); }

    .card-tag { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; padding: 4px 8px; text-transform: uppercase; color: var(--muted); z-index: 2; }
    .card-arrow { position: absolute; top: 16px; right: 16px; width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; opacity: 0; transition: all 0.2s; z-index: 2; }
    .recipe-card:hover .card-arrow { opacity: 1; transform: translate(2px, -2px); }

    .card-body { padding: 18px 20px 20px; }
    .card-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.5px; margin-bottom: 4px; line-height: 1.1; }
    .card-desc { font-size: 12px; color: var(--muted); margin-bottom: 16px; font-weight: 300; line-height: 1.5; }

    .macro-mini { display: flex; gap: 3px; height: 5px; border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
    .macro-mini-seg { border-radius: 2px; }

    .card-macros { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .cm-item { flex: 1; padding: 8px 10px; border-right: 1px solid var(--border); text-align: center; }
    .cm-item:last-child { border-right: none; }
    .cm-val { font-family: 'Bebas Neue', sans-serif; font-size: 18px; line-height: 1; }
    .cm-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-top: 2px; }

    /* EMPTY STATE */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .e-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
    .empty-state .e-text { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

    @media (max-width: 640px) {
      .hero, .filter-bar, .section-header, .recipe-grid { padding-left: 20px; padding-right: 20px; }
      .stats-bar { flex-wrap: wrap; }
      .stat-item { flex: 1 1 40%; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">MACRO<span>LAB</span></a>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">// Bodybuilder Nutrition Dashboard</div>
    <h1 class="hero-title">FUEL YOUR<br><span class="hl">GAINS</span></h1>
    <p class="hero-sub">Track macros, analyze every recipe, and optimize your nutrition for maximum muscle growth.</p>
    <div class="stats-bar">
      <div class="stat-item"><div class="si-val" id="stat-count" style="color:var(--accent)">—</div><div class="si-label">Recipes Logged</div></div>
      <div class="stat-item"><div class="si-val" id="stat-protein" style="color:var(--protein)">—</div><div class="si-label">Avg Protein / Serving</div></div>
      <div class="stat-item"><div class="si-val" id="stat-carbs" style="color:var(--carbs)">—</div><div class="si-label">Avg Carbs / Serving</div></div>
      <div class="stat-item"><div class="si-val" id="stat-fat" style="color:var(--fat)">—</div><div class="si-label">Avg Fat / Serving</div></div>
      <div class="stat-item"><div class="si-val" id="stat-calories">—</div><div class="si-label">Avg Calories / Serving</div></div>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <div class="filter-pill active" data-filter="All">All</div>
  </div>

  <div class="section-header">
    <div class="section-heading">Your Recipes</div>
    <div class="section-meta" id="recipe-count">— recipes</div>
  </div>

  <div class="recipe-grid" id="recipe-grid"></div>

  <script src="recipes.js"></script>
  <script src="js/nav.js"></script>
  <script>
    function buildStats(recipes) {
      const count = recipes.length;
      if (!count) return;
      const avg = key => recipes.reduce((s, r) => s + r.perServing[key], 0) / count;
      document.getElementById('stat-count').textContent     = count;
      document.getElementById('stat-protein').innerHTML    = avg('protein').toFixed(1) + '<span style="font-size:16px;font-family:\'DM Sans\'">g</span>';
      document.getElementById('stat-carbs').innerHTML      = avg('carbs').toFixed(1)   + '<span style="font-size:16px;font-family:\'DM Sans\'">g</span>';
      document.getElementById('stat-fat').innerHTML        = avg('fat').toFixed(1)     + '<span style="font-size:16px;font-family:\'DM Sans\'">g</span>';
      document.getElementById('stat-calories').textContent = Math.round(avg('calories'));
    }

    function buildFilters(recipes) {
      const bar  = document.getElementById('filter-bar');
      const tags = [...new Set(recipes.flatMap(r => r.tags))].sort();
      tags.forEach(tag => {
        const pill = document.createElement('div');
        pill.className    = 'filter-pill';
        pill.dataset.filter = tag;
        pill.textContent  = tag;
        bar.appendChild(pill);
      });
      bar.addEventListener('click', e => {
        const pill = e.target.closest('.filter-pill');
        if (!pill) return;
        bar.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        filterCards(pill.dataset.filter);
      });
    }

    function filterCards(activeTag) {
      const cards = document.querySelectorAll('.recipe-card[data-tags]');
      let visible = 0;
      cards.forEach(card => {
        const show = activeTag === 'All' || JSON.parse(card.dataset.tags).includes(activeTag);
        card.style.display = show ? 'block' : 'none';
        if (show) visible++;
      });
      document.getElementById('recipe-count').textContent = `${visible} recipe${visible !== 1 ? 's' : ''}`;
    }

    function buildCards(recipes) {
      const grid = document.getElementById('recipe-grid');
      document.getElementById('recipe-count').textContent = `${recipes.length} recipe${recipes.length !== 1 ? 's' : ''}`;

      if (!recipes.length) {
        grid.innerHTML = `<div class="empty-state"><div class="e-icon">🍽️</div><div class="e-text">No recipes yet — add one to recipes.js</div></div>`;
        return;
      }

      recipes.forEach((recipe, i) => {
        const { protein, carbs, fat } = recipe.macroSplit;
        const ps   = recipe.perServing;
        const card = document.createElement('a');
        card.className        = 'recipe-card';
        card.href             = `recipes/${recipe.file}`;
        card.dataset.tags     = JSON.stringify(recipe.tags);
        card.style.animationDelay = `${0.05 + i * 0.05}s`;
        card.innerHTML = `
          <div class="card-arrow">→</div>
          <div class="card-tag">${recipe.emoji} ${recipe.tags[0]}</div>
          <div class="card-thumb">
            <div class="card-thumb-bg" style="background:${recipe.thumbBg}"></div>
            <div class="card-thumb-emoji">${recipe.emoji}</div>
          </div>
          <div class="card-body">
            <div class="card-name">${recipe.name}</div>
            <div class="card-desc">${recipe.description} · ~${recipe.servings} servings</div>
            <div class="macro-mini">
              <div class="macro-mini-seg" style="flex:${protein}; background:var(--protein)"></div>
              <div class="macro-mini-seg" style="flex:${carbs};   background:var(--carbs)"></div>
              <div class="macro-mini-seg" style="flex:${fat};     background:var(--fat)"></div>
            </div>
            <div class="card-macros">
              <div class="cm-item"><div class="cm-val" style="color:var(--accent)">${ps.calories}</div><div class="cm-label">kcal</div></div>
              <div class="cm-item"><div class="cm-val" style="color:var(--protein)">${ps.protein}g</div><div class="cm-label">protein</div></div>
              <div class="cm-item"><div class="cm-val" style="color:var(--carbs)">${ps.carbs}g</div><div class="cm-label">carbs</div></div>
              <div class="cm-item"><div class="cm-val" style="color:var(--fat)">${ps.fat}g</div><div class="cm-label">fat</div></div>
            </div>
          </div>`;
        grid.appendChild(card);
      });
    }

    buildStats(RECIPES);
    buildFilters(RECIPES);
    buildCards(RECIPES);
  </script>

</body>
</html>
