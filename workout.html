<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Plan — LATTITUDE</title>
  <link rel="stylesheet" href="styles/global.css">
  <style>

    /* ── LAYOUT ─────────────────────────────────────────────── */
    .workout-wrap { max-width: 1100px; margin: 0 auto; padding: 0 clamp(24px,4vw,64px) 80px; }

    /* ── PAGE HEADER ─────────────────────────────────────────── */
    .workout-page-header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 44px clamp(24px,4vw,64px) 0;
    }
    .workout-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .workout-page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 8vw, 72px);
      line-height: 0.9;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .workout-page-title .hl { color: var(--accent); }
    .workout-page-sub {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 28px;
    }

    /* ── DAY TABS ────────────────────────────────────────────── */
    .day-tabs-wrap {
      position: sticky;
      top: 64px;
      z-index: 90;
      background: rgba(10,11,12,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .day-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 clamp(24px,4vw,64px);
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 18px 10px;
      min-width: 68px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
      margin-bottom: -1px;
    }
    .day-tab:hover { color: var(--text); }
    .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .day-tab-abbr {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      line-height: 1;
    }
    .day-tab-label {
      font-family: 'DM Mono', monospace;
      font-size: 7.5px;
      letter-spacing: 0.3px;
      margin-top: 3px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 72px;
    }

    /* ── DAY PANELS ──────────────────────────────────────────── */
    .day-panel { display: none; }
    .day-panel.active { display: block; }

    /* ── SESSION HERO ────────────────────────────────────────── */
    .session-hero {
      padding: 24px 24px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .session-day-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 2px;
    }
    .session-muscle {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .session-stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .session-stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 80px;
    }
    .session-stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .session-stat-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .session-goal {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
    }
    .session-goal strong { color: var(--text); }

    /* ── CARDIO BANNER ───────────────────────────────────────── */
    .cardio-banner {
      background: linear-gradient(135deg, rgba(232,255,71,0.05) 0%, transparent 70%);
      border: 1px solid rgba(232,255,71,0.12);
      border-radius: 10px;
      padding: 14px 16px;
      margin: 16px 16px 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .cardio-icon { font-size: 26px; flex-shrink: 0; }
    .cardio-tag {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .cardio-type { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .cardio-detail { font-size: 11px; color: var(--muted); }

    /* ── EXERCISE SECTIONS ───────────────────────────────────── */
    .ex-section { padding: 0 16px; }
    .ex-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 0 10px;
    }
    .ex-section-title {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .ex-section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── EXERCISE CARD ───────────────────────────────────────── */
    .ex-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .ex-card.open { border-color: rgba(232,255,71,0.22); }

    .ex-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 14px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ex-card-header:active { background: var(--surface2); }

    .ex-card-num {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted2);
      flex-shrink: 0;
      width: 18px;
    }
    .ex-card-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      min-width: 0;
    }
    .ex-pills {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .ex-pill {
      padding: 3px 7px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.3px;
      background: var(--surface2);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .ex-pill-sets  { color: var(--accent);   border-color: rgba(232,255,71,0.18); }
    .ex-pill-reps  { color: var(--text);      }
    .ex-pill-weight{ color: var(--carbs);     border-color: rgba(250,204,21,0.18); }

    .ex-chevron {
      color: var(--muted2);
      font-size: 12px;
      flex-shrink: 0;
      transition: transform 0.2s ease;
      margin-left: 2px;
    }
    .ex-card.open .ex-chevron { transform: rotate(180deg); color: var(--accent); }

    /* ── EXERCISE DETAIL ─────────────────────────────────────── */
    .ex-detail {
      display: none;
      border-top: 1px solid var(--border);
    }
    .ex-card.open .ex-detail { display: block; }

    /* detail body */
    .ex-detail-body { padding: 16px; }

    .ex-detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 14px;
    }
    .ex-stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .ex-stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .ex-stat-val {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
      line-height: 1.3;
    }
    .ex-stat.accent-stat .ex-stat-val { color: var(--accent); }

    /* form cue */
    .ex-cue-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 13px 14px;
    }
    .ex-cue-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .ex-cue-text {
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
    }

    /* notes row */
    .ex-notes {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 12px;
      line-height: 1.5;
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* ── RECOVERY PANEL ──────────────────────────────────────── */
    .recovery-panel { padding: 0 16px; }
    .recovery-hero {
      padding: 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .recovery-emoji { font-size: 56px; margin-bottom: 12px; }
    .recovery-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .recovery-sub { font-size: 13px; color: var(--muted); font-weight: 300; }
    .recovery-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 20px 0;
    }
    .recovery-option {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: border-color 0.15s;
    }
    .recovery-option:hover { border-color: var(--border2); }
    .recovery-option-icon { font-size: 28px; margin-bottom: 8px; }
    .recovery-option-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }
    .recovery-option-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .recovery-tips-title {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 20px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .recovery-tips-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .recovery-tip {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 7px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .recovery-tip-bullet {
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── MOBILE TWEAKS ───────────────────────────────────────── */
    @media (max-width: 640px) {
      .day-tabs-wrap { top: 54px; }
      .workout-wrap { padding-bottom: 80px; }
      .sbtn { padding: 11px 18px; font-size: 11px; }
      #session-time { font-size: 30px; }
      .set-complete-btn { padding: 14px 0; font-size: 11px; letter-spacing: 1px; }
      .set-dot { width: 12px; height: 12px; }
    }
    @media (max-width: 480px) {
      .ex-pill-weight { display: none; }
      .session-stat-val { font-size: 20px; }
      .recovery-options { grid-template-columns: 1fr; }
    }

    /* ── SESSION TIMER BAR ───────────────────────────────────── */
    .session-timer-card {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 clamp(24px,4vw,64px) 16px;
    }
    .session-timer-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s;
    }
    .session-timer-inner.running { border-color: rgba(232,255,71,0.28); }
    .stc-left { flex: 1; min-width: 0; }
    .stc-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #session-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 3px;
      line-height: 1;
      color: var(--muted);
      transition: color 0.2s;
    }
    .session-timer-inner.running #session-time { color: var(--accent); }
    .session-bar-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .sbtn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 13px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .sbtn:hover { color: var(--text); }
    .sbtn.primary { background: var(--accent); color: #000; border-color: transparent; font-weight: 600; }
    .sbtn.primary:hover { background: #d4eb3f; }

    /* ── SET TRACKER ─────────────────────────────────────────── */
    .set-tracker {
      margin-bottom: 12px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 13px 10px;
    }
    .set-tracker-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .set-tracker-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .set-dots { display: flex; gap: 6px; align-items: center; }
    .set-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      transition: background 0.25s, border-color 0.25s;
    }
    .set-dot.done { background: var(--accent); border-color: var(--accent); }
    /* rest row — hidden until a set is completed */
    .set-rest-row {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }
    .set-rest-row.active { display: flex; }
    .set-rest-cd {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      line-height: 1;
      color: var(--accent);
      min-width: 58px;
    }
    .rest-prog-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .rest-prog-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.9s linear;
    }
    .set-skip-btn {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .set-skip-btn:hover { color: var(--text); }
    .set-complete-btn {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid rgba(232,255,71,0.25);
      border-radius: 6px;
      padding: 9px 0;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .set-complete-btn:hover:not(:disabled) { background: rgba(232,255,71,0.07); }
    .set-complete-btn:disabled { color: var(--muted); border-color: var(--border); cursor: default; }
    .set-complete-btn.all-done {
      color: var(--muted);
      border-color: var(--border);
      background: transparent;
    }

    /* ── WEIGHT STEPPER ─────────────────────────────────────────── */
    .weight-stepper {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 5px 0 3px;
    }
    .weight-step-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.3px;
      padding: 7px 10px;
      min-width: 40px;
      min-height: 36px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .weight-step-btn:active { background: var(--accent); color: #000; border-color: transparent; }
    .weight-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border2);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      padding: 2px 0;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
      caret-color: var(--accent);
    }
    .weight-input::-webkit-outer-spin-button,
    .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .weight-input:focus { border-bottom-color: var(--accent); }
    .weight-input::placeholder { color: var(--muted2); font-size: 13px; }
    .weight-suggest {
      font-size: 9px;
      color: var(--muted2);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
      margin-top: 2px;
      min-height: 13px;
    }

    /* ── ADD SET ─────────────────────────────────────────────── */
    .add-set-btn {
      background: none;
      border: none;
      color: var(--muted2);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 2px 0 2px 8px;
      transition: color 0.15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .add-set-btn:hover, .add-set-btn:active { color: var(--accent); }

    /* ── SWAP EXERCISE ───────────────────────────────────────── */
    .swap-btn {
      display: inline-block;
      background: none;
      border: none;
      color: var(--muted2);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 10px 0 4px;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .swap-btn:hover, .swap-btn:active { color: var(--text); }
    .swap-form {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .swap-form.open { display: block; }
    .swap-form-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .swap-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text);
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .swap-input:focus { border-color: var(--accent); }
    .swap-form-btns { display: flex; gap: 6px; }

    /* ── ADD EXERCISE ────────────────────────────────────────── */
    .add-exercise-wrap { padding: 4px 16px 28px; }
    .add-exercise-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px dashed var(--border2);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .add-exercise-btn:hover, .add-exercise-btn:active { border-color: var(--accent); color: var(--accent); }
    .add-ex-form {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-top: 10px;
    }
    .add-ex-form.open { display: block; }
    .add-ex-form-title {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .add-ex-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .add-ex-field-full { grid-column: 1 / -1; }
    .add-ex-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }
    .add-ex-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 9px 10px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .add-ex-input:focus { border-color: var(--accent); }
    .add-ex-form-btns { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── SET LOG ─────────────────────────────────────────────── */
    .set-log { margin: 4px 0 8px; }
    .set-log-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }
    .set-log-row:last-child { border-bottom: none; }
    .set-log-num   { color: var(--muted2); min-width: 36px; font-size: 9px; letter-spacing: 0.5px; }
    .set-log-weight{ color: var(--accent); flex: 1; }
    .set-log-reps  { color: var(--text); }
    .set-log-check { color: var(--accent); font-size: 10px; }

    /* ── REPS INPUT ───────────────────────────────────────────── */
    .set-reps-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 8px;
    }
    .set-reps-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      flex: 1;
    }
    .reps-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 17px;
      padding: 6px 0;
      width: 64px;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
      -webkit-tap-highlight-color: transparent;
    }
    .reps-input::-webkit-outer-spin-button,
    .reps-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .reps-input:focus { border-color: var(--accent); }

  </style>
</head>
<body>

  <!-- ── NAV ──────────────────────────────────────────────── -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">LATT<span>ITUDE</span></a>
      <div class="nav-links">
        <a href="recipes.html" class="nav-link">Recipes</a>
        <a href="workout.html" class="nav-link active">Workout</a>
      </div>
      <div class="nav-actions">
        <div id="auth-nav"></div>
        <a href="profile.html" class="btn-add" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border)">My Goals</a>
        <a href="builder.html" class="btn-add">+ Recipe</a>
      </div>
    </div>
  </nav>

  <!-- ── PAGE HEADER ──────────────────────────────────────── -->
  <div class="workout-page-header fade-up">
    <div class="workout-eyebrow">// Men's Physique · Cut Phase · 5-Day Split</div>
    <h1 class="workout-page-title">WORKOUT<br><span class="hl">PLAN</span></h1>
    <p class="workout-page-sub">Cut-phase training to maintain muscle, accelerate fat loss, and build stage-ready physique detail.</p>
  </div>

  <!-- ── SESSION TIMER CARD ──────────────────────────────── -->
  <div class="session-timer-card fade-up">
    <div class="session-timer-inner" id="session-timer-inner">
      <div class="stc-left">
        <div class="stc-label">// Session Timer</div>
        <div id="session-time">00:00</div>
      </div>
      <div class="session-bar-btns">
        <button id="session-start-btn" class="sbtn primary">Start Session</button>
        <button id="session-pause-btn" class="sbtn" style="display:none">Pause</button>
        <button id="session-reset-btn" class="sbtn" style="display:none">Reset</button>
      </div>
    </div>
  </div>

  <!-- ── DAY TABS ─────────────────────────────────────────── -->
  <div class="day-tabs-wrap">
    <div class="day-tabs" id="day-tabs"></div>
  </div>

  <!-- ── DAY PANELS ───────────────────────────────────────── -->
  <div class="workout-wrap" id="day-panels"></div>

  <!-- ── SCRIPTS ──────────────────────────────────────────── -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/workout-data.js"></script>
  <script src="js/nav.js"></script>

  <script>
    /* ── BUILD TABS ─────────────────────────────────────────── */
    function buildTabs() {
      const tabsEl = document.getElementById('day-tabs');
      WORKOUT_DAYS.forEach((day, i) => {
        const btn = document.createElement('button');
        btn.className = 'day-tab' + (i === 0 ? ' active' : '');
        btn.dataset.index = i;
        btn.innerHTML = `
          <span class="day-tab-abbr">${day.abbr}</span>
          <span class="day-tab-label">${day.name}</span>`;
        btn.addEventListener('click', () => switchDay(i));
        tabsEl.appendChild(btn);
      });
    }

    /* ── SWITCH DAY ─────────────────────────────────────────── */
    function switchDay(index) {
      document.querySelectorAll('.day-tab').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.day-panel').forEach((p, i) => {
        p.classList.toggle('active', i === index);
      });
      // scroll the active tab into view
      const activeTab = document.querySelectorAll('.day-tab')[index];
      activeTab?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    /* ── BUILD PANELS ───────────────────────────────────────── */
    function buildPanels() {
      const container = document.getElementById('day-panels');
      WORKOUT_DAYS.forEach((day, i) => {
        const panel = document.createElement('div');
        panel.className = 'day-panel' + (i === 0 ? ' active' : '');
        panel.id = `panel-${day.id}`;

        if (day.isRecovery) {
          panel.innerHTML = buildRecoveryPanel(day);
          container.appendChild(panel);
        } else {
          panel.innerHTML = buildTrainingPanel(day);
          injectCustomExercises(panel, day);
          container.appendChild(panel);   // append first so getElementById works in listeners
          attachCardListeners(panel, day);
        }
      });
    }

    /* ── TRAINING PANEL ─────────────────────────────────────── */
    function buildTrainingPanel(day) {
      let exIndex = 0;
      const sectionsHTML = day.sections.map(section => {
        const exercisesHTML = section.exercises.map(ex => {
          exIndex++;
          return buildExerciseCard(ex, exIndex);
        }).join('');
        return `
          <div class="ex-section">
            <div class="ex-section-header">
              <span class="ex-section-title">${section.title}</span>
              <span class="ex-section-line"></span>
            </div>
            ${exercisesHTML}
          </div>`;
      }).join('');

      return `
        <div class="session-hero">
          <div class="session-day-name">${day.name}</div>
          <div class="session-muscle">${day.muscleGroup}</div>
          <div class="session-stats">
            <div class="session-stat">
              <div class="session-stat-val">${day.duration.split(' ')[0]}<span style="font-size:13px;font-family:'DM Sans';font-weight:300"> ${day.duration.split(' ').slice(1).join(' ')}</span></div>
              <div class="session-stat-label">Duration</div>
            </div>
            <div class="session-stat">
              <div class="session-stat-val">${day.exerciseCount}</div>
              <div class="session-stat-label">Exercises</div>
            </div>
            <div class="session-stat">
              <div class="session-stat-val">${day.setCount}</div>
              <div class="session-stat-label">Total Sets</div>
            </div>
          </div>
          <div class="session-goal">Goal: <strong>${day.goal}</strong></div>
        </div>

        <div class="cardio-banner">
          <div class="cardio-icon">${day.cardio.icon}</div>
          <div>
            <div class="cardio-tag">Post-Workout Cardio</div>
            <div class="cardio-type">${day.cardio.type} · ${day.cardio.duration}</div>
            <div class="cardio-detail">${day.cardio.detail}</div>
          </div>
        </div>

        ${sectionsHTML}
        <div class="add-exercise-wrap">
          <button type="button" class="add-exercise-btn" id="aeb-${day.id}">+ Add Exercise</button>
          <div class="add-ex-form" id="aef-${day.id}">
            <div class="add-ex-form-title">// Add Exercise</div>
            <div class="add-ex-fields">
              <div class="add-ex-field-full">
                <label class="add-ex-label">Exercise Name</label>
                <input type="text" class="add-ex-input" id="aef-name-${day.id}" placeholder="e.g. Cable Curl" autocomplete="off">
              </div>
              <div>
                <label class="add-ex-label">Sets</label>
                <input type="number" inputmode="numeric" class="add-ex-input" id="aef-sets-${day.id}" placeholder="3" min="1" max="10">
              </div>
              <div>
                <label class="add-ex-label">Reps</label>
                <input type="text" class="add-ex-input" id="aef-reps-${day.id}" placeholder="10–12">
              </div>
              <div>
                <label class="add-ex-label">Weight (lbs)</label>
                <input type="number" inputmode="decimal" class="add-ex-input" id="aef-weight-${day.id}" placeholder="—">
              </div>
              <div>
                <label class="add-ex-label">Rest</label>
                <input type="text" class="add-ex-input" id="aef-rest-${day.id}" placeholder="90 sec">
              </div>
            </div>
            <div class="add-ex-form-btns">
              <button type="button" class="sbtn" id="aef-cancel-${day.id}">Cancel</button>
              <button type="button" class="sbtn primary" id="aef-save-${day.id}">Add Exercise</button>
            </div>
          </div>
        </div>`;
    }

    /* ── EXERCISE CARD HTML ─────────────────────────────────── */
    function buildExerciseCard(ex, num) {
      const safeId      = ex.name.replace(/[^a-z0-9]/gi, '-').toLowerCase();
      const displayName = localStorage.getItem(`latt_swap_${safeId}`) || ex.name;
      const restSecs    = parseInt((ex.rest ? ex.rest.match(/\d+/) || ['90'] : ['90'])[0]);
      const dotsHtml    = Array.from({length: ex.sets}, (_, i) =>
        `<span class="set-dot" id="dot-${safeId}-${i}"></span>`).join('');
      const defaultReps = String(ex.reps || '').match(/\d+/)?.[0] || '';
      const notesHtml = ex.notes ? `<div class="ex-notes">${escHtml(ex.notes)}</div>` : '';
      const cueHtml   = ex.cue   ? `<div class="ex-cue-box"><div class="ex-cue-label">Form Cue</div><div class="ex-cue-text">${escHtml(ex.cue)}</div></div>` : '';
      return `
        <div class="ex-card" data-exercise="${escHtml(ex.name)}" id="ex-${safeId}">
          <div class="ex-card-header">
            <span class="ex-card-num">${String(num).padStart(2,'0')}</span>
            <span class="ex-card-name">${escHtml(displayName)}</span>
            <div class="ex-pills">
              <span class="ex-pill ex-pill-sets" id="pill-sets-${safeId}">${ex.sets}×</span>
              <span class="ex-pill ex-pill-reps">${escHtml(ex.reps)}</span>
              <span class="ex-pill ex-pill-weight">${escHtml(ex.weight || '—')}</span>
            </div>
            <span class="ex-chevron">▾</span>
          </div>
          <div class="ex-detail">
            <div class="ex-detail-body">
              <div class="ex-detail-stats">
                <div class="ex-stat accent-stat">
                  <div class="ex-stat-label">Weight Logged</div>
                  <div class="weight-stepper">
                    <button type="button" class="weight-step-btn" data-delta="-5">−5</button>
                    <input type="number" inputmode="decimal" class="weight-input" id="wi-${safeId}"
                      placeholder="lbs" step="2.5" min="0"
                      data-suggest="${escHtml(ex.weight || '')}" autocomplete="off">
                    <button type="button" class="weight-step-btn" data-delta="5">+5</button>
                  </div>
                  <div class="weight-suggest" id="ws-${safeId}">Plan: ${escHtml(ex.weight || '—')}</div>
                </div>
                <div class="ex-stat">
                  <div class="ex-stat-label">Rest</div>
                  <div class="ex-stat-val">${escHtml(ex.rest || '90 sec')}</div>
                </div>
                <div class="ex-stat">
                  <div class="ex-stat-label">Sets × Reps</div>
                  <div class="ex-stat-val" id="setreps-${safeId}">${ex.sets} × ${escHtml(ex.reps)}</div>
                </div>
                <div class="ex-stat">
                  <div class="ex-stat-label">RIR Target</div>
                  <div class="ex-stat-val">${escHtml(ex.rir || '1–2')}</div>
                </div>
              </div>
              <div class="set-tracker">
                <div class="set-tracker-top">
                  <span class="set-tracker-lbl">Sets</span>
                  <div class="set-dots" id="dots-${safeId}">${dotsHtml}</div>
                  <button type="button" class="add-set-btn" id="asb-${safeId}">+ Set</button>
                </div>
                <div class="set-log" id="sl-${safeId}"></div>
                <div class="set-rest-row" id="srr-${safeId}">
                  <span class="set-rest-cd" id="src-${safeId}">0:00</span>
                  <div class="rest-prog-track">
                    <div class="rest-prog-fill" id="srf-${safeId}" style="width:100%"></div>
                  </div>
                  <button class="set-skip-btn" id="ssk-${safeId}">Skip</button>
                </div>
                <div class="set-reps-row">
                  <span class="set-reps-label">Reps done</span>
                  <input type="number" inputmode="numeric" class="reps-input" id="ri-${safeId}"
                    value="${defaultReps}" placeholder="${defaultReps || '—'}" min="0" max="99" autocomplete="off">
                </div>
                <button class="set-complete-btn" id="scb-${safeId}"
                  data-secs="${restSecs}" data-sets="${ex.sets}">
                  Complete Set 1
                </button>
              </div>
              <button type="button" class="swap-btn" id="swb-${safeId}">↔ Swap Exercise</button>
              <div class="swap-form" id="swf-${safeId}">
                <div class="swap-form-label">Replace with</div>
                <input type="text" class="swap-input" id="swi-${safeId}"
                  value="${escHtml(displayName)}" autocomplete="off">
                <div class="swap-form-btns">
                  <button type="button" class="sbtn primary" id="swsave-${safeId}">Save</button>
                  <button type="button" class="sbtn" id="swcancel-${safeId}">Cancel</button>
                </div>
              </div>
              ${notesHtml}
              ${cueHtml}
            </div>
          </div>
        </div>`;
    }

    /* ── CARD LISTENERS ─────────────────────────────────────── */
    function attachSingleCardListeners(card, panel, day) {
      const header  = card.querySelector('.ex-card-header');
      const exName  = card.dataset.exercise;
      const safeId  = exName.replace(/[^a-z0-9]/gi, '-').toLowerCase();
      const cmpBtn  = card.querySelector('.set-complete-btn');
      const skipBtn = card.querySelector('.set-skip-btn');

      if (cmpBtn) {
        initSetState(safeId, parseInt(cmpBtn.dataset.sets) || 1, exName, day.id);
        cmpBtn.addEventListener('click', () => completeSet(safeId));
      }
      if (skipBtn) skipBtn.addEventListener('click', () => skipSetRest(safeId));

      header?.addEventListener('click', () => {
        const wasOpen = card.classList.contains('open');
        panel.querySelectorAll('.ex-card').forEach(c => c.classList.remove('open'));
        if (!wasOpen) card.classList.add('open');
      });

      // Weight stepper
      const wInput = card.querySelector('.weight-input');
      if (wInput) {
        const saved = localStorage.getItem(`latt_weight_${safeId}`);
        if (saved) wInput.value = saved;
        wInput.addEventListener('input', () => {
          if (wInput.value) localStorage.setItem(`latt_weight_${safeId}`, wInput.value);
          else localStorage.removeItem(`latt_weight_${safeId}`);
        });
        card.querySelectorAll('.weight-step-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const delta = parseFloat(btn.dataset.delta);
            const cur   = parseFloat(wInput.value) || 0;
            const next  = Math.max(0, cur + delta);
            wInput.value = next % 1 === 0 ? next : next.toFixed(1);
            wInput.dispatchEvent(new Event('input'));
          });
        });
      }

      // + Set
      const addSetBtn = card.querySelector('.add-set-btn');
      if (addSetBtn) addSetBtn.addEventListener('click', e => { e.stopPropagation(); addSet(safeId); });

      // Swap — use card.querySelector so this works before panel is in the document
      const swapBtn     = card.querySelector('.swap-btn');
      const swapForm    = card.querySelector('.swap-form');
      const swapInput   = card.querySelector('.swap-input');
      const swSaveBtn   = card.querySelector('.swap-form-btns .primary');
      const swCancelBtn = card.querySelector('.swap-form-btns .sbtn:not(.primary)');
      if (swapBtn && swapForm) {
        swapBtn.addEventListener('click', () => {
          swapForm.classList.toggle('open');
          if (swapForm.classList.contains('open')) { swapInput?.focus(); swapInput?.select(); }
        });
        swSaveBtn?.addEventListener('click', () => {
          const newName = swapInput?.value.trim();
          if (!newName) return;
          card.querySelector('.ex-card-name').textContent = newName;
          localStorage.setItem(`latt_swap_${safeId}`, newName);
          swapForm.classList.remove('open');
        });
        swCancelBtn?.addEventListener('click', () => {
          swapForm.classList.remove('open');
          if (swapInput) swapInput.value = localStorage.getItem(`latt_swap_${safeId}`) || exName;
        });
      }
    }

    function attachCardListeners(panel, day) {
      panel.querySelectorAll('.ex-card').forEach(card => attachSingleCardListeners(card, panel, day));
      setupAddExerciseForm(panel, day);
    }

    /* ── ADD SET ─────────────────────────────────────────────── */
    function addSet(safeId) {
      const st = setStates[safeId];
      if (!st) return;
      st.total++;
      const dotsEl = document.getElementById(`dots-${safeId}`);
      if (dotsEl) {
        const dot = document.createElement('span');
        dot.className = 'set-dot' + (st.total - 1 < st.done ? ' done' : '');
        dot.id = `dot-${safeId}-${st.total - 1}`;
        dotsEl.appendChild(dot);
      }
      const pill = document.getElementById(`pill-sets-${safeId}`);
      if (pill) pill.textContent = `${st.total}×`;
      const setreps = document.getElementById(`setreps-${safeId}`);
      if (setreps) setreps.textContent = setreps.textContent.replace(/^\d+/, st.total);
      const btn = document.getElementById(`scb-${safeId}`);
      if (btn) {
        btn.dataset.sets = st.total;
        if (btn.classList.contains('all-done')) {
          btn.textContent = `Complete Set ${st.total}`;
          btn.disabled = false;
          btn.classList.remove('all-done');
        }
      }
    }

    /* ── ADD EXERCISE ────────────────────────────────────────── */
    function setupAddExerciseForm(panel, day) {
      const addBtn    = document.getElementById(`aeb-${day.id}`);
      const form      = document.getElementById(`aef-${day.id}`);
      const cancelBtn = document.getElementById(`aef-cancel-${day.id}`);
      const saveBtn   = document.getElementById(`aef-save-${day.id}`);
      if (!addBtn || !form) return;

      addBtn.addEventListener('click', () => {
        form.classList.toggle('open');
        if (form.classList.contains('open')) document.getElementById(`aef-name-${day.id}`)?.focus();
      });
      cancelBtn?.addEventListener('click', () => { form.classList.remove('open'); clearAddExForm(day.id); });
      saveBtn?.addEventListener('click', () => {
        const name   = document.getElementById(`aef-name-${day.id}`)?.value.trim();
        if (!name) { document.getElementById(`aef-name-${day.id}`)?.focus(); return; }
        const sets   = parseInt(document.getElementById(`aef-sets-${day.id}`)?.value)   || 3;
        const reps   = document.getElementById(`aef-reps-${day.id}`)?.value.trim()   || '10–12';
        const weight = document.getElementById(`aef-weight-${day.id}`)?.value.trim() || '—';
        const rest   = document.getElementById(`aef-rest-${day.id}`)?.value.trim()   || '90 sec';
        const exData = { name, sets, reps, weight, rest, notes: '', cue: '', rir: '1–2' };
        addCustomExerciseToPanel(panel, day, exData);
        saveCustomExercise(day.id, exData);
        form.classList.remove('open');
        clearAddExForm(day.id);
      });
    }

    function clearAddExForm(dayId) {
      ['name','sets','reps','weight','rest'].forEach(f => {
        const el = document.getElementById(`aef-${f}-${dayId}`);
        if (el) el.value = '';
      });
    }

    function addCustomExerciseToPanel(panel, day, exData) {
      let section = panel.querySelector('.custom-ex-section');
      if (!section) {
        section = document.createElement('div');
        section.className = 'ex-section custom-ex-section';
        section.innerHTML = `<div class="ex-section-header"><span class="ex-section-title">Added</span><span class="ex-section-line"></span></div>`;
        const wrap = panel.querySelector('.add-exercise-wrap');
        panel.insertBefore(section, wrap || null);
      }
      const num = panel.querySelectorAll('.ex-card').length + 1;
      section.insertAdjacentHTML('beforeend', buildExerciseCard(exData, num));
      const safeId  = exData.name.replace(/[^a-z0-9]/gi, '-').toLowerCase();
      const newCard = document.getElementById(`ex-${safeId}`);
      if (newCard) attachSingleCardListeners(newCard, panel, day);
    }

    function saveCustomExercise(dayId, exData) {
      const key  = `latt_custom_exs_${dayId}`;
      const list = JSON.parse(localStorage.getItem(key) || '[]');
      if (!list.find(e => e.name === exData.name)) {
        list.push(exData);
        localStorage.setItem(key, JSON.stringify(list));
      }
    }

    function injectCustomExercises(panel, day) {
      const list = JSON.parse(localStorage.getItem(`latt_custom_exs_${day.id}`) || '[]');
      if (!list.length) return;
      let section = document.createElement('div');
      section.className = 'ex-section custom-ex-section';
      section.innerHTML = `<div class="ex-section-header"><span class="ex-section-title">Added</span><span class="ex-section-line"></span></div>`;
      const wrap = panel.querySelector('.add-exercise-wrap');
      panel.insertBefore(section, wrap || null);
      let num = panel.querySelectorAll('.ex-card').length;
      list.forEach(exData => { num++; section.insertAdjacentHTML('beforeend', buildExerciseCard(exData, num)); });
    }

    /* ── RECOVERY PANEL ─────────────────────────────────────── */
    function buildRecoveryPanel(day) {
      const isActive = day.recoveryType === 'active';
      const emoji    = isActive ? '🌊' : '😴';
      const sub      = isActive
        ? 'Choose any activity that gets you moving at low intensity. This is about blood flow, not performance.'
        : 'Today you do nothing. Rest is not laziness — it is a required adaptation stimulus.';

      const optionsHTML = isActive && day.recoveryOptions ? `
        <div class="recovery-options">
          ${day.recoveryOptions.map(o => `
            <div class="recovery-option">
              <div class="recovery-option-icon">${o.icon}</div>
              <div class="recovery-option-label">${o.label}</div>
              <div class="recovery-option-desc">${escHtml(o.desc)}</div>
            </div>`).join('')}
        </div>` : '';

      const tipsHTML = day.recoveryTips.map(tip => `
        <div class="recovery-tip">
          <span class="recovery-tip-bullet">›</span>
          <span>${escHtml(tip)}</span>
        </div>`).join('');

      return `
        <div class="recovery-hero">
          <div class="recovery-emoji">${emoji}</div>
          <div class="recovery-title">${day.name}</div>
          <div class="recovery-sub">${sub}</div>
        </div>
        <div class="recovery-panel">
          ${optionsHTML}
          <div class="recovery-tips-title">Recovery Guidelines</div>
          ${tipsHTML}
        </div>`;
    }

    /* ── UTILITY ────────────────────────────────────────────── */
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /* ── SET TRACKER ─────────────────────────────────────────── */
    const setStates = {};

    function initSetState(id, total, exName, dayId) {
      const savedDone = Math.min(parseInt(localStorage.getItem(`latt_set_${id}`) || '0'), total);
      const savedLog  = JSON.parse(localStorage.getItem(`latt_setlog_${id}`) || '[]');
      if (!setStates[id]) {
        setStates[id] = { done: savedDone, total, timer: null, name: exName || id, dayId: dayId || '', log: savedLog };
      }
      const st = setStates[id];
      // Restore dots
      for (let i = 0; i < st.done; i++) {
        const dot = document.getElementById(`dot-${id}-${i}`);
        if (dot) dot.classList.add('done');
      }
      // Restore per-set log display
      st.log.forEach(entry => appendSetLogRow(id, entry.set, entry.weight, entry.reps));
      // Restore button state
      const btn = document.getElementById(`scb-${id}`);
      if (btn) {
        if (st.done >= st.total) {
          btn.textContent = 'All Sets Done';
          btn.disabled = true;
          btn.classList.add('all-done');
        } else if (st.done > 0) {
          btn.textContent = `Complete Set ${st.done + 1}`;
        }
      }
    }

    function appendSetLogRow(id, setNum, weight, reps) {
      const logEl = document.getElementById(`sl-${id}`);
      if (!logEl) return;
      const row = document.createElement('div');
      row.className = 'set-log-row';
      row.innerHTML =
        `<span class="set-log-num">Set ${setNum}</span>` +
        `<span class="set-log-weight">${weight > 0 ? weight + ' lbs' : '—'}</span>` +
        `<span class="set-log-reps">${reps > 0 ? '× ' + reps : '—'}</span>` +
        `<span class="set-log-check">✓</span>`;
      logEl.appendChild(row);
    }

    function completeSet(id) {
      const st = setStates[id];
      if (!st || st.timer) return;

      // Capture weight + reps for this set
      const weight  = parseFloat(document.getElementById(`wi-${id}`)?.value) || 0;
      const reps    = parseInt(document.getElementById(`ri-${id}`)?.value)   || 0;
      const setNum  = st.done + 1;

      // Mark dot
      const dot = document.getElementById(`dot-${id}-${st.done}`);
      if (dot) dot.classList.add('done');
      st.done++;

      // Save per-set log
      if (!st.log) st.log = [];
      st.log.push({ set: setNum, weight, reps });
      localStorage.setItem(`latt_set_${id}`,    String(st.done));
      localStorage.setItem(`latt_setlog_${id}`, JSON.stringify(st.log));

      // Display the completed set row
      appendSetLogRow(id, setNum, weight, reps);

      // Save to Firestore
      if (window.saveWorkoutLog) {
        window.saveWorkoutLog(id, st.name, weight, st.done, st.dayId, st.log).catch(console.error);
      }

      const btn  = document.getElementById(`scb-${id}`);
      const secs = parseInt(btn.dataset.secs) || 90;
      if (st.done >= st.total) {
        btn.textContent = 'All Sets Done';
        btn.disabled    = true;
        btn.classList.add('all-done');
        return;
      }
      startSetRest(id, secs);
    }

    function startSetRest(id, total) {
      const st   = setStates[id];
      const row  = document.getElementById(`srr-${id}`);
      const cd   = document.getElementById(`src-${id}`);
      const fill = document.getElementById(`srf-${id}`);
      const btn  = document.getElementById(`scb-${id}`);
      let remaining = total;
      row.classList.add('active');
      btn.disabled    = true;
      btn.textContent = 'Resting…';
      function tick() {
        if (remaining <= 0) {
          clearInterval(st.timer);
          st.timer = null;
          finishSetRest(id);
          return;
        }
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        cd.textContent   = `${m}:${String(s).padStart(2,'0')}`;
        fill.style.width = `${(remaining / total) * 100}%`;
        remaining--;
      }
      tick();
      st.timer = setInterval(tick, 1000);
    }

    function finishSetRest(id) {
      const st   = setStates[id];
      const row  = document.getElementById(`srr-${id}`);
      const btn  = document.getElementById(`scb-${id}`);
      const fill = document.getElementById(`srf-${id}`);
      row.classList.remove('active');
      fill.style.width = '100%';
      btn.disabled     = false;
      btn.textContent  = `Complete Set ${st.done + 1}`;
      if (navigator.vibrate) navigator.vibrate([150, 80, 150, 80, 300]);
    }

    function skipSetRest(id) {
      const st = setStates[id];
      if (st?.timer) { clearInterval(st.timer); st.timer = null; }
      finishSetRest(id);
    }

    /* ── INIT ───────────────────────────────────────────────── */
    buildTabs();
    buildPanels();

    // Set today's tab active (0=Mon ... 6=Sun, JS: 0=Sun ... 6=Sat → remap)
    const jsDay = new Date().getDay(); // 0=Sun,1=Mon,...,6=Sat
    const todayIndex = jsDay === 0 ? 6 : jsDay - 1; // 0=Mon,...,6=Sun
    if (todayIndex >= 0 && todayIndex < WORKOUT_DAYS.length) {
      switchDay(todayIndex);
    }

    // Auth nav + load workout history
    auth.onAuthStateChanged(user => {
      renderAuthNav(user);
      if (user) loadAndApplyWorkoutLogs();
    });

    /* ── WORKOUT LOG / PROGRESSION ──────────────────────────── */
    function fmtLogDate(dateStr) {
      const d    = new Date(dateStr + 'T12:00:00');
      const now  = new Date();
      const diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      if (diff <  7)  return `${diff}d ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function applyWorkoutLogs(logs) {
      Object.entries(logs).forEach(([exerciseId, log]) => {
        const input   = document.getElementById(`wi-${exerciseId}`);
        const suggest = document.getElementById(`ws-${exerciseId}`);
        // Pre-fill input only if user hasn't typed anything yet this session
        if (input && !input.value) {
          input.value = log.weight;
          localStorage.setItem(`latt_weight_${exerciseId}`, String(log.weight));
        }
        if (suggest) {
          const dateLabel = fmtLogDate(log.date);
          suggest.textContent = `Last: ${log.weight} lbs · ${dateLabel}`;
        }
      });
    }

    async function loadAndApplyWorkoutLogs() {
      const logs = await window.loadRecentWorkoutLogs();
      applyWorkoutLogs(logs);
    }

    /* ── SESSION TIMER ──────────────────────────────────────── */
    const SK_ELAPSED = 'latt_sess_elapsed';
    const SK_START   = 'latt_sess_start';
    const SK_RUNNING = 'latt_sess_running';

    let sessionInterval = null;
    let sessionStart    = null;
    let sessionElapsed  = 0;
    let sessionRunning  = false;

    function fmtTime(ms) {
      const t = Math.floor(ms / 1000);
      const h = Math.floor(t / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function tickSession() {
      document.getElementById('session-time').textContent =
        fmtTime(sessionElapsed + (Date.now() - sessionStart));
    }

    function saveSessionState() {
      localStorage.setItem(SK_ELAPSED, String(sessionElapsed));
      localStorage.setItem(SK_START,   String(sessionStart || 0));
      localStorage.setItem(SK_RUNNING, String(sessionRunning));
    }

    function setTimerUI(running) {
      document.getElementById('session-timer-inner').classList.toggle('running', running);
      document.getElementById('session-start-btn').style.display = running ? 'none' : '';
      document.getElementById('session-pause-btn').style.display = running ? '' : 'none';
      document.getElementById('session-reset-btn').style.display = running ? '' : 'none';
    }

    document.getElementById('session-start-btn').addEventListener('click', () => {
      sessionStart   = Date.now();
      sessionRunning = true;
      sessionInterval = setInterval(tickSession, 500);
      setTimerUI(true);
      saveSessionState();
    });

    document.getElementById('session-pause-btn').addEventListener('click', function () {
      if (sessionRunning) {
        sessionElapsed += Date.now() - sessionStart;
        clearInterval(sessionInterval);
        sessionRunning   = false;
        this.textContent = 'Resume';
        this.classList.add('primary');
        document.getElementById('session-timer-inner').classList.remove('running');
      } else {
        sessionStart    = Date.now();
        sessionRunning  = true;
        sessionInterval = setInterval(tickSession, 500);
        this.textContent = 'Pause';
        this.classList.remove('primary');
        document.getElementById('session-timer-inner').classList.add('running');
      }
      saveSessionState();
    });

    document.getElementById('session-reset-btn').addEventListener('click', () => {
      clearInterval(sessionInterval);
      sessionInterval = null; sessionStart = null;
      sessionElapsed  = 0;    sessionRunning = false;
      document.getElementById('session-time').textContent = '00:00';
      setTimerUI(false);
      const pb = document.getElementById('session-pause-btn');
      pb.textContent = 'Pause'; pb.classList.remove('primary');
      // Clear persisted session + set states
      [SK_ELAPSED, SK_START, SK_RUNNING].forEach(k => localStorage.removeItem(k));
      Object.keys(localStorage).filter(k => k.startsWith('latt_set_') || k.startsWith('latt_setlog_'))
        .forEach(k => localStorage.removeItem(k));
      // Reset set UI
      Object.keys(setStates).forEach(id => {
        const st = setStates[id];
        if (st.timer) { clearInterval(st.timer); st.timer = null; }
        st.done = 0;
        st.log  = [];
        for (let i = 0; i < st.total; i++) {
          const dot = document.getElementById(`dot-${id}-${i}`);
          if (dot) dot.classList.remove('done');
        }
        const btn    = document.getElementById(`scb-${id}`);
        if (btn) { btn.textContent = 'Complete Set 1'; btn.disabled = false; btn.classList.remove('all-done'); }
        const row    = document.getElementById(`srr-${id}`);
        if (row) row.classList.remove('active');
        const logEl  = document.getElementById(`sl-${id}`);
        if (logEl) logEl.innerHTML = '';
      });
    });

    // Restore session state across refreshes
    (function restoreSession() {
      const savedElapsed = parseInt(localStorage.getItem(SK_ELAPSED) || '0');
      const savedStart   = parseInt(localStorage.getItem(SK_START)   || '0');
      const wasRunning   = localStorage.getItem(SK_RUNNING) === 'true';
      if (savedElapsed <= 0 && !wasRunning) return;
      document.getElementById('session-pause-btn').style.display = '';
      document.getElementById('session-reset-btn').style.display = '';
      document.getElementById('session-start-btn').style.display = 'none';
      if (wasRunning && savedStart > 0) {
        sessionElapsed  = savedElapsed + (Date.now() - savedStart);
        sessionStart    = Date.now();
        sessionRunning  = true;
        sessionInterval = setInterval(tickSession, 500);
        document.getElementById('session-timer-inner').classList.add('running');
        tickSession();
      } else {
        sessionElapsed = savedElapsed;
        document.getElementById('session-time').textContent = fmtTime(savedElapsed);
        const pb = document.getElementById('session-pause-btn');
        pb.textContent = 'Resume';
        pb.classList.add('primary');
      }
    })();

  </script>

</body>
</html>
